<!-- Modales de connexion/inscription responsives -->
<div id="authModal" class="modal" style="display: none;">
  <div class="modal-overlay" onclick="closeAuthModal()"></div>
  <div class="modal-content">
    <button class="modal-close" onclick="closeAuthModal()">
      <i class="fas fa-times"></i>
    </button>
    
    <!-- Onglets -->
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">
        <i class="fas fa-sign-in-alt"></i> Connexion
      </button>
      <button class="auth-tab" data-tab="register" onclick="switchAuthTab('register')">
        <i class="fas fa-user-plus"></i> Inscription
      </button>
    </div>

    <!-- Formulaire de connexion -->
    <div id="loginTab" class="auth-tab-content active">
      <h3>Connexion à SMART-LOUMA</h3>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="loginEmail">Email *</label>
          <input type="email" id="loginEmail" required placeholder="votre@email.com">
        </div>
        <div class="form-group">
          <label for="loginPassword">Mot de passe *</label>
          <input type="password" id="loginPassword" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-full">
          <i class="fas fa-sign-in-alt"></i> Se connecter
        </button>
      </form>
    </div>

    <!-- Formulaire d'inscription -->
    <div id="registerTab" class="auth-tab-content">
      <h3>Inscription à SMART-LOUMA</h3>
      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="registerName">Nom complet *</label>
          <input type="text" id="registerName" required placeholder="Votre nom">
        </div>
        <div class="form-group">
          <label for="registerEmail">Email *</label>
          <input type="email" id="registerEmail" required placeholder="votre@email.com">
        </div>
        <div class="form-group">
          <label for="registerPhone">Téléphone</label>
          <input type="tel" id="registerPhone" placeholder="+221 XX XXX XX XX">
        </div>
        <div class="form-group">
          <label for="registerRole">Type de compte *</label>
          <select id="registerRole" required onchange="toggleCompanyField()">
            <option value="">Sélectionner...</option>
            <option value="consumer">Restaurateur/Consommateur</option>
            <option value="producer">Producteur</option>
          </select>
        </div>
        <div class="form-group" id="companyField" style="display: none;">
          <label for="registerCompany">Nom de l'entreprise</label>
          <input type="text" id="registerCompany" placeholder="Nom de votre entreprise">
        </div>
        <div class="form-group">
          <label for="registerPassword">Mot de passe *</label>
          <input type="password" id="registerPassword" required placeholder="••••••••" minlength="6">
        </div>
        <div class="form-group">
          <label for="registerPasswordConfirm">Confirmer le mot de passe *</label>
          <input type="password" id="registerPasswordConfirm" required placeholder="••••••••" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-full">
          <i class="fas fa-user-plus"></i> S'inscrire
        </button>
      </form>
    </div>

    <div id="authMessage" class="auth-message" style="display: none;"></div>
  </div>
</div>
